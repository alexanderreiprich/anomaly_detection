tables:
  patients:
    file: ./data/raw/patient_202603211747.csv
    drop:
      - in_start_phase
      - start_phase_completed
      - gender
      - created_date
      - deleted
      - operator
      - pur
      - previous_pur
      - user_id
      - name
      - surname
    rename:
      id: patient_id
      birth_date: age_range
      weight: weight_range
      height: height_range
    columns:
      patient_id:     consistent_id     
      name:        name_first
      surname:       name_last
      age_range:   age_range         
      weight_range:        weight_range      
      height_range:        height_range

  measurements:
    file: ./data/raw/measurement_202603211747.csv
    drop:
      - leukocytes
      - nitrite
      - protein
      - blood
      - glucose
      - ascorbic_acid
      - bilirubin
      - ketone
      - urobilinogen
      - scheduled_next_measurement
      - ph
      - specific_gravity
      - cup_serial_number
      - measurement_type
      - device_battery_level
      - device_mac_address
      - invalid
      - invalid_reason
      - cup_id
    rename:
      id: measurement_id
    columns:
      measurement_id: consistent_id
      patient_id: consistent_id
      urine_volume: urine_volume
      flow_time: flow_time
      max_flow: max_flow
      rise_time: rise_time
      micturition_time: micturition_time
      created_date: created_date
  
  urine_flow:
    file: ./data/raw/urine_flow_202603211747.csv
    rename:
      id: urine_flow_id
    columns:
      urine_flow_id: consistent_id
      measurement_id: consistent_id
  
  biomarkers:
    file: ./data/raw/measurement_202603211747.csv
    drop:
      - urine_volume
      - flow_time
      - max_flow
      - rise_time
      - micturition_time
      - created_date
      - scheduled_next_measurement
      - specific_gravity
      - cup_serial_number
      - measurement_type
      - device_battery_level
      - device_mac_address
      - invalid
      - invalid_reason
      - cup_id
    rename:
      id: measurement_id
    columns:
      measurement_id: consistent_id
      patient_id: consistent_id
      leukocytes: biomarker
      nitrite: biomarker
      protein: biomarker
      blood: biomarker
      glucose: biomarker
      ascorbic_acid: biomarker
      bilirubin: biomarker
      ketone: biomarker
      urobilinogen: biomarker

  ipss_submissions:
    file: ./data/raw/ipss_submissions_202603211747.csv
    drop:
      - notes
      - created_at
      - updated_at
    rename:
      id: submission_id
    columns:
      submission_id: consistent_id
      patient_id: consistent_id
      score: score
      submitted_at: submitted_at

  ipss_questions:
    file: ./data/raw/ipss_questions_202603211747.csv
    drop:
      - created_at
      - updated_at
    rename:
      id: question_id
    columns:
      question_id: consistent_id
      question_number: question_number
      question_text: question_text

  ipss_answer_options:
    file: ./data/raw/ipss_answer_options_202603211747.csv
    drop:
      - display_order
      - created_at
      - updated_at
    rename:
      id: answer_option_id
    columns:
      answer_option_id: consistent_id
      question_id: consistent_id
      option_value: option_value
      option_text: option_text
      points: points

  ipss_responses:
    file: ./data/raw/ipss_responses_202603211747.csv
    drop:
      - answered_at
      - created_at
      - updated_at
    rename:
      id: response_id
    columns:
      response_id: consistent_id
      submission_id: consistent_id
      question_id: consistent_id
      answer_option_id: consistent_id
      answer_value: answer_value

